<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', system-ui, sans-serif; background: #F8FAFC; color: #0F172A; margin: 0; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

/* Sidebar nav item */
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 500;
  color: #475569; border-radius: 0; transition: all 0.15s ease;
  border-left: 2px solid transparent; user-select: none;
}
.nav-item:hover { background: #F1F5F9; color: #0F172A; }
.nav-item.active { background: #EFF6FF; color: #0369A1; border-left-color: #0369A1; font-weight: 600; }

/* Group label */
.group-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: #94A3B8;
  padding: 20px 16px 6px; display: flex; align-items: center; gap:6px;
}

/* Field type badge */
.type-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500; padding: 2px 8px;
  border-radius: 4px; background: #F1F5F9; color: #475569;
  border: 1px solid #E2E8F0; white-space: nowrap;
}

/* Status badge */
.badge-req { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
.badge-opt { background: #F0F9FF; color: #0369A1; border: 1px solid #BAE6FD; font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }

/* Note boxes */
.note-tip  { background: #FFFBEB; border: 1px solid #FDE68A; border-left: 3px solid #F59E0B; }
.note-info { background: #EFF6FF; border: 1px solid #BFDBFE; border-left: 3px solid #3B82F6; }
.note-warn { background: #FFF7ED; border: 1px solid #FED7AA; border-left: 3px solid #F97316; }

/* Content fade */
#content-area { transition: opacity 0.12s ease; }
#content-area.fading { opacity: 0; }

/* Search highlight */
.nav-item.hidden-item { display: none; }

/* Sidebar group collapse */
.group-items { overflow: hidden; }
#sidebar { transition: width 0.18s ease; }
#main-content { transition: margin-left 0.18s ease; }
#sidebar-toggle {
  position: fixed;
  top: 64px;
  width: 24px;
  height: 24px;
  border-radius: 999px;
  border: 1px solid #cbd5e1;
  background: white;
  color: #334155;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 120;
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.15);
  transition: left 0.18s ease, transform 0.18s ease;
}
</style>
</head>

    </div>

</header>

<!-- LAYOUT -->
<div style="display:flex;min-height:100vh;padding-top:52px;">

            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0369A1" stroke-width="1.8">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>

              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <h1 style="font-size:22px;font-weight:700;color:#0F172A;margin:0 0 10px;font-family:'Space Grotesk',sans-serif;">Content Type Reference</h1>
          <p style="color:#64748B;font-size:14px;line-height:1.6;margin:0 0 32px;">
            Documentation for all 19 content types used in the ST website. Select a content type from the sidebar to view its fields, requirements, and usage notes.
          </p>
          <!-- Group overview cards -->
          <div id="group-overview" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:left;"></div>
        </div>
      </div>

      <!-- SECTION DETAIL VIEW -->
      <div id="section-view" style="display:none;max-width:800px;"></div>

    </div>
  </main>
</div>

function applySidebarState() {
  var sidebar = document.getElementById("sidebar");
  var main = document.getElementById("main-content");
  var toggle = document.getElementById("sidebar-toggle");
  if (!sidebar || !main || !toggle) return;

  if (sidebarCollapsed) {
    sidebar.style.width = "0px";
    sidebar.style.borderRight = "0";
    main.style.marginLeft = "0";
    toggle.style.left = "8px";
    document.getElementById("sidebar-toggle-icon").textContent = "›";
  } else {
    sidebar.style.width = SIDEBAR_WIDTH + "px";
    sidebar.style.borderRight = "1px solid #E2E8F0";
    main.style.marginLeft = SIDEBAR_WIDTH + "px";
    toggle.style.left = (SIDEBAR_WIDTH - 12) + "px";
    document.getElementById("sidebar-toggle-icon").textContent = "‹";
  }
}

function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  sessionStorage.setItem("sidebarCollapsed", sidebarCollapsed ? "1" : "0");
  applySidebarState();
}

  document.getElementById("stat-total").textContent = String(DATA.length);

function showToast(message, type) {
  var root = document.getElementById("toast-root");
  if (!root) {
    root = document.createElement("div");
    root.id = "toast-root";
    root.style.cssText = "position:fixed;right:16px;bottom:16px;z-index:300;display:grid;gap:8px;max-width:340px;";
    document.body.appendChild(root);
  }
  var tone = type === "error"
    ? "background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;"
    : "background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;";
  var toast = document.createElement("div");
  toast.style.cssText = "padding:10px 12px;border-radius:8px;font-size:12.5px;box-shadow:0 6px 20px rgba(15,23,42,.12);" + tone;
  toast.textContent = message;
  root.appendChild(toast);
  setTimeout(function () {
    toast.style.opacity = "0";
    toast.style.transition = "opacity .2s ease";
    setTimeout(function () { toast.remove(); }, 220);
  }, 2200);
}

async function apiRequest(url, options) {
  var response = await fetch(API_BASE + url, options || {});
  if (!response.ok) {
    var body = await response.json().catch(function () {
      return {};
    });
    throw new Error(body.error || "Request failed");
  }
  if (response.status === 204) return null;
  return response.json();
}

async function createContentType() {
  openContentTypeModal({
    title: "Add Content Type",
    values: { icon: "ti ti-file", color: "#EEF2F7", group: "Custom" },
    disableId: false,
    onSubmit: async function (payload) {
      try {
        await apiRequest("/content-types", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            id: payload.id,
            name: payload.name,
            machine: payload.machine,
            group: payload.group,
            icon: payload.icon,
            color: payload.color,
            description: payload.description,
            fields: []
          })
        });
        await loadData();
        buildSidebar(null);
        renderWelcome();
        selectSection(payload.id);
        showToast("Content type created.", "success");
      } catch (error) {
        showToast(error.message || "Failed to create content type.", "error");
      }
    }
  });
}

  openContentTypeModal({

    disableId: true,
    onSubmit: async function (payload) {
      try {
        await apiRequest("/content-types/" + encodeURIComponent(id), {

          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: payload.name,
            group: payload.group,

            machine: payload.machine,

  if (!confirm("Delete this content type? This cannot be undone.")) return;
  try {
    await apiRequest("/content-types/" + encodeURIComponent(id), { method: "DELETE" });

  nav.innerHTML = '';
  var groups = {};
  DATA.forEach(function(s) {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  var hasAny = false;
  Object.keys(groups).forEach(function(g) {
    var items = groups[g];
    if (filter) items = items.filter(function(s){ return s.name.toLowerCase().includes(filter) || s.group.toLowerCase().includes(filter); });
    if (!items.length) return;
    hasAny = true;

    // Group label
    var gl = document.createElement('div');
    gl.className = 'group-label';
    gl.innerHTML = (GROUP_ICONS[g]||'') + '&nbsp;&nbsp;' + g;
    gl.style.cssText = 'font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#94A3B8;padding:20px 16px 6px;display:flex;align-items:center;gap:6px;';
    nav.appendChild(gl);

    items.forEach(function(s) {
      var el = document.createElement('div');
      el.className = 'nav-item' + (s.id === activeId ? ' active' : '');
      el.setAttribute('data-id', s.id);
      var req = s.fields.filter(function(f){ return f.status==='required'; }).length;
      el.innerHTML =
        '<i class="' + s.icon + '" style="font-size:16px;line-height:1;flex-shrink:0;"></i>' +
        '<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + s.name + '</span>' +
        '<span style="font-size:10px;background:#F1F5F9;color:#94A3B8;padding:1px 6px;border-radius:10px;flex-shrink:0;">' + s.fields.length + '</span>';
      el.onclick = function(){ selectSection(s.id); };
      nav.appendChild(el);
    });
  });

  document.getElementById('no-results').style.display = hasAny ? 'none' : 'block';
}

// ─── SELECT SECTION ──────────────────────────────────────────────────────────
function selectSection(id) {
  activeId = id;
  var s = DATA.find(function(x){ return x.id === id; });
  if (!s) return;

  // Update sidebar active
  document.querySelectorAll('.nav-item').forEach(function(el){
    el.classList.toggle('active', el.getAttribute('data-id') === id);
  });

  var area = document.getElementById('content-area');
  area.classList.add('fading');
  setTimeout(function(){
    renderSection(s);
    area.classList.remove('fading');
  }, 100);

  // Scroll sidebar item into view
  var activeEl = document.querySelector('.nav-item.active');
  if (activeEl) activeEl.scrollIntoView({block:'nearest'});
}

function renderSection(s) {
  document.getElementById('welcome-view').style.display = 'none';
  var view = document.getElementById('section-view');
  view.style.display = 'block';

  var reqFields = s.fields.filter(function(f){ return f.status==='required'; });
  var optFields = s.fields.filter(function(f){ return f.status==='optional'; });

  // Note HTML
  var noteHtml = '';
  if (s.note) {
    var noteClass = 'note-' + s.note.kind;
    var noteIconClass = s.note.kind === 'tip' ? 'ti ti-bulb' : s.note.kind === 'warn' ? 'ti ti-alert-triangle' : 'ti ti-info-circle';
    noteHtml = '<div class="' + noteClass + '" style="border-radius:6px;padding:10px 14px;margin-bottom:20px;font-size:13px;line-height:1.6;color:#374151;">' +
      '<i class="' + noteIconClass + '" style="font-size:14px;margin-right:6px;vertical-align:middle;"></i>' + s.note.text + '</div>';
  }

  var taxonomyNoteHtml = '';
  if (s.taxonomyNote) {
    taxonomyNoteHtml = '<div style="background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;padding:10px 14px;margin-bottom:20px;font-size:12.5px;color:#475569;line-height:1.6;">' +
      '<span style="font-weight:600;color:#0F172A;">Taxonomy note: </span>' + s.taxonomyNote + '</div>';
  }

  // Fields table
  function fieldsTable(fields) {
    if (!fields.length) return '<p style="color:#94A3B8;font-size:13px;font-style:italic;">None</p>';
    var rows = fields.map(function(f){
      var typeLabel = TYPE_LABELS[f.type] || f.type;
      var multi = f.multiple ? ' <span style="font-size:10px;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;padding:1px 5px;border-radius:3px;margin-left:3px;">×multi</span>' : '';
      return '<tr style="border-bottom:1px solid #F1F5F9;">' +
        '<td style="padding:10px 12px;font-size:13px;font-weight:500;color:#0F172A;white-space:nowrap;">' + f.label + multi + '</td>' +
        '<td style="padding:10px 12px;"><code style="font-size:11px;background:#F8FAFC;color:#64748B;padding:2px 6px;border-radius:3px;font-family:ui-monospace,monospace;border:1px solid #E2E8F0;">' + f.machine + '</code></td>' +
        '<td style="padding:10px 12px;"><span class="type-pill">' + typeLabel + '</span></td>' +
        '<td style="padding:10px 12px;font-size:12.5px;color:#64748B;line-height:1.5;">' + f.hint + '</td>' +
        '<td style="padding:10px 12px;white-space:nowrap;">' +
          '<button onclick="editField(\'' + s.id + '\',' + f.id + ')" style="background:#F8FAFC;border:1px solid #E2E8F0;color:#334155;padding:4px 8px;border-radius:5px;font-size:11px;cursor:pointer;margin-right:4px;">Edit</button>' +
          '<button onclick="deleteField(\'' + s.id + '\',' + f.id + ')" style="background:white;border:1px solid #FECACA;color:#DC2626;padding:4px 8px;border-radius:5px;font-size:11px;cursor:pointer;">Delete</button>' +
        '</td>' +
        '</tr>';
    }).join('');
    return '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;background:white;border:1px solid #E2E8F0;border-radius:8px;overflow:hidden;">' +
      '<thead><tr style="background:#F8FAFC;">' +
      '<th style="padding:9px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;letter-spacing:.04em;text-transform:uppercase;">Field</th>' +
      '<th style="padding:9px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;letter-spacing:.04em;text-transform:uppercase;">Machine Name</th>' +
      '<th style="padding:9px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;letter-spacing:.04em;text-transform:uppercase;">Type</th>' +
      '<th style="padding:9px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;letter-spacing:.04em;text-transform:uppercase;">Hint</th>' +
      '<th style="padding:9px 12px;font-size:11px;font-weight:600;color:#64748B;text-align:left;letter-spacing:.04em;text-transform:uppercase;">Actions</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table></div>';
  }

  view.innerHTML =
    // Header
    '<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:24px;">' +
      '<div style="width:48px;height:48px;border-radius:10px;background:' + s.color + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="' + s.icon + '" style="font-size:24px;color:#475569;"></i></div>' +
      '<div style="flex:1;">' +
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
          '<h1 style="font-size:20px;font-weight:700;color:#0F172A;margin:0;font-family:\'Space Grotesk\',sans-serif;">' + s.name + '</h1>' +
          '<span style="font-size:11px;background:#F1F5F9;color:#64748B;padding:2px 8px;border-radius:4px;border:1px solid #E2E8F0;">' + s.group + '</span>' +
        '</div>' +
        '<p style="color:#64748B;font-size:13.5px;margin:6px 0 0;line-height:1.6;">' + s.description + '</p>' +
      '</div>' +
    '</div>' +

    '<div style="display:flex;gap:8px;margin-bottom:18px;">' +
      '<button onclick="editContentType(\'' + s.id + '\')" style="background:#0F172A;color:white;border:1px solid #0F172A;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;">Edit</button>' +
      '<button onclick="deleteContentType(\'' + s.id + '\')" style="background:white;color:#DC2626;border:1px solid #FECACA;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;">Delete</button>' +
      '<button onclick="createField(\'' + s.id + '\')" style="background:#0369A1;color:white;border:1px solid #0369A1;padding:7px 12px;border-radius:6px;font-size:12px;cursor:pointer;">Add Field</button>' +
    '</div>' +

    // Meta row
    '<div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;">' +
      '<div style="background:white;border:1px solid #E2E8F0;border-radius:6px;padding:8px 14px;text-align:center;">' +
        '<div style="font-size:18px;font-weight:700;color:#0F172A;">' + s.fields.length + '</div>' +
        '<div style="font-size:11px;color:#94A3B8;margin-top:1px;">Total Fields</div>' +
      '</div>' +
      '<div style="background:white;border:1px solid #E2E8F0;border-radius:6px;padding:8px 14px;text-align:center;">' +
        '<div style="font-size:18px;font-weight:700;color:#DC2626;">' + reqFields.length + '</div>' +
        '<div style="font-size:11px;color:#94A3B8;margin-top:1px;">Required</div>' +
      '</div>' +
      '<div style="background:white;border:1px solid #E2E8F0;border-radius:6px;padding:8px 14px;text-align:center;">' +
        '<div style="font-size:18px;font-weight:700;color:#0369A1;">' + optFields.length + '</div>' +
        '<div style="font-size:11px;color:#94A3B8;margin-top:1px;">Optional</div>' +
      '</div>' +
      '<div style="background:white;border:1px solid #E2E8F0;border-radius:6px;padding:8px 14px;">' +
        '<div style="font-size:11px;color:#94A3B8;margin-bottom:2px;">Machine Name</div>' +
        '<code style="font-size:12px;color:#0F172A;font-family:ui-monospace,monospace;">' + s.machine + '</code>' +
      '</div>' +
    '</div>' +

    noteHtml + taxonomyNoteHtml +

    // Required fields
    (reqFields.length ? '<div style="margin-bottom:24px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span class="badge-req">Required</span><span style="font-size:13px;font-weight:600;color:#0F172A;">' + reqFields.length + ' field' + (reqFields.length!==1?'s':'') + '</span></div>' + fieldsTable(reqFields) + '</div>' : '') +

    // Optional fields
    (optFields.length ? '<div style="margin-bottom:24px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;"><span class="badge-opt">Optional</span><span style="font-size:13px;font-weight:600;color:#0F172A;">' + optFields.length + ' field' + (optFields.length!==1?'s':'') + '</span></div>' + fieldsTable(optFields) + '</div>' : '') +

    // Navigation between sections
    (function(){
      var idx = DATA.findIndex(function(x){ return x.id === s.id; });
      var prev = DATA[idx-1], next = DATA[idx+1];
      if (!prev && !next) return '';
      return '<div style="display:flex;gap:8px;margin-top:8px;padding-top:20px;border-top:1px solid #E2E8F0;">' +
        (prev ? '<button onclick="selectSection(\'' + prev.id + '\')" style="display:flex;align-items:center;gap:6px;background:white;border:1px solid #E2E8F0;padding:7px 14px;border-radius:6px;font-size:12.5px;color:#475569;cursor:pointer;font-family:Inter,sans-serif;" onmouseover="this.style.background=\'#F8FAFC\'" onmouseout="this.style.background=\'white\'">← ' + prev.name + '</button>' : '<span></span>') +
        '<div style="flex:1;"></div>' +
        (next ? '<button onclick="selectSection(\'' + next.id + '\')" style="display:flex;align-items:center;gap:6px;background:white;border:1px solid #E2E8F0;padding:7px 14px;border-radius:6px;font-size:12.5px;color:#475569;cursor:pointer;font-family:Inter,sans-serif;" onmouseover="this.style.background=\'#F8FAFC\'" onmouseout="this.style.background=\'white\'"> ' + next.name + ' →</button>' : '') +
        '</div>';
    })();
}

// ─── WELCOME / GROUP OVERVIEW ────────────────────────────────────────────────
function renderWelcome() {
  var groups = {};
  DATA.forEach(function(s){ if(!groups[s.group]) groups[s.group]=[]; groups[s.group].push(s); });
  var el = document.getElementById('group-overview');
  el.innerHTML = Object.keys(groups).map(function(g){
    var items = groups[g];
    var icons = items.slice(0,4).map(function(s){ return '<i class="' + s.icon + '" style="font-size:18px;color:#94A3B8;"></i>'; }).join('');
    return '<div onclick="selectSection(\'' + items[0].id + '\')" style="background:white;border:1px solid #E2E8F0;border-radius:8px;padding:14px 16px;cursor:pointer;transition:box-shadow .15s;" onmouseover="this.style.boxShadow=\'0 2px 8px rgba(0,0,0,.08)\'" onmouseout="this.style.boxShadow=\'none\'">' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
        '<div style="color:#0369A1;">' + (GROUP_ICONS[g]||'') + '</div>' +
        '<span style="font-size:12.5px;font-weight:600;color:#0F172A;">' + g + '</span>' +
      '</div>' +
      '<div style="font-size:11px;color:#94A3B8;">' + items.length + ' content type' + (items.length!==1?'s':'') + '</div>' +
      '<div style="margin-top:8px;display:flex;gap:6px;align-items:center;">' + icons + '</div>' +
    '</div>';
  }).join('');
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function(){
  var q = this.value.trim().toLowerCase();
  buildSidebar(q || null);
  if (!q && activeId) {
    document.querySelectorAll('.nav-item').forEach(function(el){
      el.classList.toggle('active', el.getAttribute('data-id') === activeId);
    });
  }
});

// ─── KEYBOARD NAV ────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e){
  if (document.activeElement === document.getElementById('search-input')) return;
  if (!activeId) return;
  var idx = DATA.findIndex(function(x){ return x.id === activeId; });
  if (e.key === 'ArrowDown' && DATA[idx+1]) { e.preventDefault(); selectSection(DATA[idx+1].id); }
  if (e.key === 'ArrowUp'   && DATA[idx-1]) { e.preventDefault(); selectSection(DATA[idx-1].id); }
});

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById("stat-total").insertAdjacentHTML(
  "afterend",
  '<button onclick="createContentType()" style="margin-top:6px;background:#0369A1;color:white;border:1px solid #0369A1;padding:4px 8px;border-radius:4px;font-size:10px;cursor:pointer;">Add</button>',
);

sidebarCollapsed = sessionStorage.getItem("sidebarCollapsed") === "1";
document.getElementById("sidebar-toggle").addEventListener("click", toggleSidebar);
applySidebarState();

loadData()
  .then(function () {
    buildSidebar(null);
    renderWelcome();
  })
  .catch(function (err) {
    console.error(err);
    alert("Unable to load data from API. Start server with `npm run dev:api`.");
  });
</script>
</body>
